name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: porpoise

jobs:
  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../porpoise-linux-${{ matrix.arch }}.tar.gz porpoise
          cd ../../..

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: porpoise-linux-${{ matrix.arch }}.tar.gz

  build-deb:
    name: Build .deb package
    runs-on: ubuntu-latest
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Create symlink for cargo-deb
        run: |
          mkdir -p target/release
          cp target/x86_64-unknown-linux-musl/release/porpoise target/release/porpoise

      - name: Build .deb
        run: cargo deb --no-build

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: target/debian/*.deb

  build-rpm:
    name: Build .rpm package
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y gcc rpm-build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/porpoise

      - name: Build .rpm
        run: cargo generate-rpm

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: target/generate-rpm/*.rpm

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package zip
        run: |
          Compress-Archive -Path target\release\porpoise.exe -DestinationPath porpoise-windows-x86_64.zip

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: porpoise-windows-x86_64.zip

  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../porpoise-macos-${{ matrix.arch }}.tar.gz porpoise
          cd ../../..

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: porpoise-macos-${{ matrix.arch }}.tar.gz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-deb
      - build-rpm
      - build-windows
      - build-macos
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.msi
          body: |
            ## Porpoise ${{ github.ref_name }}

            Software development orchestration tool powered by Claude Code.

            ### Installation

            **Windows (ZIP)**
            Extract `porpoise-windows-x86_64.zip` and add the folder to your PATH.

            **Ubuntu/Debian**
            ```bash
            sudo dpkg -i porpoise_*.deb
            ```

            **RHEL/Fedora**
            ```bash
            sudo rpm -i porpoise-*.rpm
            ```

            **macOS / Linux (tarball)**
            ```bash
            tar xzf porpoise-*.tar.gz
            sudo mv porpoise /usr/local/bin/
            ```

            ### Usage
            ```bash
            # Run in any project directory
            porpoise

            # Force new initialization
            porpoise --new

            # Start from a specific role
            porpoise --from developer

            # Dry run
            porpoise --dry-run
            ```
